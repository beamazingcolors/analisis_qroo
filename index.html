<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RivieraLuxury Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Modal simple */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-blue-500/30 min-h-screen">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/50">
                    <i data-lucide="building" class="text-white w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">RivieraLuxury <span class="text-blue-400">Analytics</span></h1>
                    <p class="text-xs text-slate-400">Inteligencia Inmobiliaria · Cancún & Riviera Maya</p>
                </div>
            </div>
            <div class="flex items-center gap-2 text-xs text-slate-500 bg-slate-950 px-3 py-1 rounded-full border border-slate-800">
                <i data-lucide="database" class="w-3 h-3"></i> Base de datos editable local
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex space-x-1 bg-slate-900 p-1 rounded-xl w-fit mb-8 border border-slate-800">
            <button onclick="setTab('dashboard')" id="tab-btn-dashboard" class="px-4 py-2 rounded-lg text-sm font-medium transition-all bg-slate-800 text-blue-400 shadow">Dashboard</button>
            <button onclick="setTab('table')" id="tab-btn-table" class="px-4 py-2 rounded-lg text-sm font-medium transition-all text-slate-400 hover:text-white hover:bg-slate-800/50">Base de Datos</button>
        </div>

        <div id="view-dashboard" class="fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 h-96">
                    <h3 class="text-white font-semibold mb-4">ROI por Desarrollo</h3>
                    <canvas id="roiChart"></canvas>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 h-96">
                    <h3 class="text-white font-semibold mb-4">Ventas vs Ocupación</h3>
                    <canvas id="salesOccChart"></canvas>
                </div>
            </div>
        </div>

        <div id="view-table" class="hidden fade-in">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden">
                <table class="w-full text-left text-sm text-slate-300">
                    <thead class="bg-slate-900/50">
                        <tr><th class="p-4">Desarrollo</th><th class="p-4">ROI</th><th class="p-4">Ventas</th><th class="p-4">Acciones</th></tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Edición -->
    <div id="edit-modal" class="modal hidden">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-700 w-full max-w-lg">
            <h2 class="text-xl font-bold mb-4 text-white">Editar Desarrollo</h2>
            <div id="edit-form" class="space-y-4"></div>
            <div class="flex gap-2 mt-6">
                <button onclick="saveEdit()" class="bg-blue-600 px-4 py-2 rounded text-white">Guardar</button>
                <button onclick="closeModal()" class="bg-slate-700 px-4 py-2 rounded text-white">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let properties = JSON.parse(localStorage.getItem('riviera_data')) || [
            { id: "nautica-res", name: "Nautica Residences", roi: 14.5, sales: 75, price: "$800k" },
            { id: "shark-tower", name: "Shark Tower", roi: 9.8, sales: 95, price: "$1.2M" },
            { id: "sls-cancun", name: "SLS Cancún", roi: 11.2, sales: 100, price: "$1.5M" },
            { id: "blume", name: "Blume Boutique", roi: 10.5, sales: 88, price: "$900k" },
            { id: "aria", name: "Aria Puerto Cancún", roi: 9.5, sales: 98, price: "$1.1M" },
            { id: "kinesia", name: "Kinesia", roi: 12.0, sales: 60, price: "$300k" },
            { id: "sls-harbour", name: "SLS Harbour Beach", roi: 10.8, sales: 92, price: "$1.4M" },
            { id: "marea", name: "Marea", roi: 9.0, sales: 85, price: "$800k" },
            { id: "alba", name: "ALBA", roi: 13.5, sales: 70, price: "$750k" },
            { id: "be-towers", name: "Be Towers", roi: 8.5, sales: 99, price: "$600k" },
            { id: "emerald", name: "Emerald", roi: 8.0, sales: 100, price: "$2M" },
            { id: "sls-marina", name: "SLS Marina", roi: 11.5, sales: 85, price: "$1.6M" },
            { id: "la-amada", name: "La Amada", roi: 10.0, sales: 90, price: "$500k" },
            { id: "novo", name: "Novo Cancún", roi: 8.8, sales: 95, price: "$900k" },
            { id: "isola", name: "Isola", roi: 8.2, sales: 98, price: "$500k" },
            { id: "waldorf", name: "Waldorf Astoria", roi: 15.0, sales: 55, price: "$2.5M" },
            { id: "w-res", name: "W Residences", roi: 14.0, sales: 65, price: "$1.8M" },
            { id: "st-regis", name: "St. Regis", roi: 12.5, sales: 70, price: "$3M" },
            { id: "una", name: "UNA", roi: 13.0, sales: 50, price: "$1M" },
            { id: "ancora", name: "Ancora", roi: 11.0, sales: 80, price: "$400k" }
        ];

        let charts = {};

        function setTab(tabId) {
            document.getElementById('view-dashboard').classList.toggle('hidden', tabId !== 'dashboard');
            document.getElementById('view-table').classList.toggle('hidden', tabId !== 'table');
            if(tabId === 'dashboard') renderCharts();
        }

        function updateUI() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = properties.map(p => `
                <tr class="border-b border-slate-700/50">
                    <td class="p-4">${p.name}</td>
                    <td class="p-4">${p.roi}%</td>
                    <td class="p-4">${p.sales}%</td>
                    <td class="p-4"><button onclick="editProp('${p.id}')" class="text-blue-400 hover:underline">Editar</button></td>
                </tr>
            `).join('');
        }

        function editProp(id) {
            const p = properties.find(x => x.id === id);
            document.getElementById('edit-form').innerHTML = `
                <input type="hidden" id="edit-id" value="${p.id}">
                <label>Nombre: <input id="edit-name" value="${p.name}" class="w-full bg-slate-800 p-2 mt-1"></label>
                <label>ROI (%): <input id="edit-roi" value="${p.roi}" class="w-full bg-slate-800 p-2 mt-1"></label>
                <label>Ventas (%): <input id="edit-sales" value="${p.sales}" class="w-full bg-slate-800 p-2 mt-1"></label>
            `;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const p = properties.find(x => x.id === id);
            p.name = document.getElementById('edit-name').value;
            p.roi = parseFloat(document.getElementById('edit-roi').value);
            p.sales = parseFloat(document.getElementById('edit-sales').value);
            localStorage.setItem('riviera_data', JSON.stringify(properties));
            closeModal();
            updateUI();
            renderCharts();
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        function renderCharts() {
            if(charts.roi) charts.roi.destroy();
            charts.roi = new Chart(document.getElementById('roiChart'), { type: 'bar', data: { labels: properties.map(p=>p.name), datasets: [{ data: properties.map(p=>p.roi), backgroundColor: '#3b82f6' }] } });
        }

        window.onload = () => { updateUI(); renderCharts(); lucide.createIcons(); };
    </script>
</body>
</html>
