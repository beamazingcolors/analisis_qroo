<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IA - Turismo Caribe Mexicano</title>
    
    <!-- Tailwind CSS para estilos rápidos y responsivos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f1f5f9; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .animate-spin-slow { 
            animation: spin 2s linear infinite; 
        }
        @keyframes spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-teal-200 selection:text-teal-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ÍCONOS SVG OPTIMIZADOS ---
        const Icon = ({ path, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: path }} />
        );
        const RefreshCw = (p) => <Icon {...p} path='<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>' />;
        const MapPin = (p) => <Icon {...p} path='<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>' />;
        const Instagram = (p) => <Icon {...p} path='<rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>' />;
        const TrendingUp = (p) => <Icon {...p} path='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' />;
        const Clock = (p) => <Icon {...p} path='<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' />;
        const Check = (p) => <Icon {...p} path='<polyline points="20 6 9 17 4 12"/>' />;
        const Copy = (p) => <Icon {...p} path='<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>' />;
        const Download = (p) => <Icon {...p} path='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>' />;
        const Sparkles = (p) => <Icon {...p} path='<path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>' />;

        // --- DATOS Y CONOCIMIENTO DEL AGENTE ---
        const actividadesBase = [
            { id: 1, nombre: "Catamarán a Isla Mujeres", ubicacion: "Cancún", demanda: 95, icon: "⛵" },
            { id: 2, nombre: "Río Subterráneo Xcaret", ubicacion: "Riviera Maya", demanda: 91, icon: "🌿" },
            { id: 3, nombre: "Ruinas de Chichén Itzá", ubicacion: "Yucatán", demanda: 88, icon: "🏛️" },
            { id: 4, nombre: "Nado con Tortugas en Akumal", ubicacion: "Riviera Maya", demanda: 86, icon: "🐢" },
            { id: 5, nombre: "Vida Nocturna Coco Bongo", ubicacion: "Cancún", demanda: 82, icon: "🪩" },
            { id: 6, nombre: "Cenotes Escondidos", ubicacion: "Tulum", demanda: 79, icon: "🤿" },
        ];

        // Imágenes de altísima calidad pre-seleccionadas que simulan el output de la IA
        const imagenesIA = {
            1: "https://images.unsplash.com/photo-1551918120-9739cb430c6d?auto=format&fit=crop&q=80&w=1000", // Catamaran
            2: "https://images.unsplash.com/photo-1628135894165-5c128af55099?auto=format&fit=crop&q=80&w=1000", // Selva/Rio
            3: "https://images.unsplash.com/photo-1518182170546-076616fd4aa8?auto=format&fit=crop&q=80&w=1000", // Chichen Itza
            4: "https://images.unsplash.com/photo-1437622368342-7a3d73a34c8f?auto=format&fit=crop&q=80&w=1000", // Tortuga
            5: "https://images.unsplash.com/photo-1566737236500-c8ac43014a67?auto=format&fit=crop&q=80&w=1000", // Fiesta/Noche
            6: "https://images.unsplash.com/photo-1604928148948-43d9c7336a5a?auto=format&fit=crop&q=80&w=1000", // Cenote
        };

        const generarPosts = (topActividades) => {
            const emojis = ["✨", "🌴", "🌊", "📸", "🎒", "☀️"];
            
            return topActividades.slice(0, 3).map((act, index) => {
                let copy = "";
                let tipo = "";
                
                // Variabilidad en los copys dependiendo del puesto en tendencia
                if (index === 0) {
                    tipo = "Venta Directa 🔥";
                    copy = `¡Alerta de Tendencia! 🚨\n\nTodos están hablando de: ${act.nombre}. No dejes que te lo cuenten y vive la experiencia más solicitada en ${act.ubicacion}. 🌊🌴\n\n👉 Cupos limitados para esta semana.\n💬 Mándanos DM con la palabra "AVENTURA" para un 15% OFF.\n\nReserva segura y garantizada con nosotros.`;
                } else if (index === 1) {
                    tipo = "Inspiracional ✨";
                    copy = `Desconecta de la rutina y reconecta con la magia de ${act.ubicacion}. 🍃\n\nNuestra experiencia en ${act.nombre} está diseñada para crear recuerdos que durarán toda la vida. 📸 ¿Con quién compartirías este paraíso?\n\n👇 Etiquétal@ en los comentarios.\n\nLink en nuestra bio para conocer los paquetes.`;
                } else {
                    tipo = "Informativo 🎒";
                    copy = `¿Planeando tu viaje a la Península? 📝\n\nAñade ${act.nombre} a tu itinerario. Es una de las joyas mejor guardadas de ${act.ubicacion} y una actividad imperdible esta temporada. ☀️\n\nIncluye transporte, guía certificado y entradas.\n\n📲 Contáctanos por WhatsApp para armar tu paquete ideal.`;
                }

                return {
                    id: act.id,
                    actividad: act.nombre,
                    ubicacion: act.ubicacion,
                    imagenUrl: null, // Comienza sin imagen
                    isGeneratingImage: true,
                    copy: copy,
                    hashtags: `#${act.ubicacion.replace(/\s+/g, '')} #CaribeMexicano #ViajaPorMexico #Turismo #Vacaciones #AgenciaDeViajes`,
                    tipo: tipo
                };
            });
        };

        const Toast = ({ mensaje, visible }) => {
            if (!visible) return null;
            return (
                <div className="fixed bottom-6 right-6 bg-slate-900/95 backdrop-blur-md text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50 transition-all transform animate-bounce-in border border-slate-700">
                    <Check size={20} className="text-emerald-400" />
                    <span className="font-medium">{mensaje}</span>
                </div>
            );
        };

        function App() {
            const [isSyncing, setIsSyncing] = useState(false);
            const [lastSync, setLastSync] = useState(new Date());
            const [actividades, setActividades] = useState([]);
            const [posts, setPosts] = useState([]);
            const [toastMessage, setToastMessage] = useState("");
            const [showToast, setShowToast] = useState(false);

            useEffect(() => {
                // Simular una carga inicial
                actualizarDatos();
            }, []);

            const actualizarDatos = () => {
                setIsSyncing(true);
                
                // 1. Simular análisis de datos (demanda)
                setTimeout(() => {
                    const actividadesActualizadas = actividadesBase.map(act => ({
                        ...act,
                        // Fluctua la demanda aleatoriamente para dar sensación de tiempo real
                        demanda: Math.min(100, Math.max(60, act.demanda + (Math.floor(Math.random() * 15) - 7)))
                    })).sort((a, b) => b.demanda - a.demanda);

                    setActividades(actividadesActualizadas);
                    
                    // 2. Generar plantillas de texto
                    const nuevosPosts = generarPosts(actividadesActualizadas);
                    setPosts(nuevosPosts);
                    setLastSync(new Date());
                    
                    mostrarToast("Datos actualizados. Generando arte con IA...");

                    // 3. Simular la generación secuencial de imágenes de Nano Banana AI
                    simularGeneracionImagenes(nuevosPosts);

                }, 1200); // Retraso del scraper
            };

            const simularGeneracionImagenes = async (postsGenerados) => {
                for (let i = 0; i < postsGenerados.length; i++) {
                    const post = postsGenerados[i];
                    
                    // Esperar entre 2 y 3.5 segundos por imagen para simular el procesamiento de IA
                    const delay = Math.floor(Math.random() * 1500) + 2000;
                    await new Promise(r => setTimeout(r, delay));

                    setPosts(currentPosts => 
                        currentPosts.map(p => 
                            p.id === post.id 
                            ? { ...p, imagenUrl: imagenesIA[p.id], isGeneratingImage: false } 
                            : p
                        )
                    );
                }
                setIsSyncing(false);
                mostrarToast("¡Análisis y multimedia 100% listos!");
            };

            const mostrarToast = (mensaje) => {
                setToastMessage(mensaje);
                setShowToast(true);
                setTimeout(() => setShowToast(false), 3500);
            };

            const copiarAlPortapapeles = (texto) => {
                const textarea = document.createElement('textarea');
                textarea.value = texto;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    mostrarToast("¡Texto copiado! Listo para Instagram.");
                } catch (err) {
                    console.error('Error al copiar', err);
                }
                document.body.removeChild(textarea);
            };

            // Descarga segura para evitar problemas de CORS con imágenes externas
            const descargarImagen = async (url, nombreActividad) => {
                if (!url) return;
                mostrarToast("Preparando imagen en alta calidad...");
                
                try {
                    const response = await fetch(url);
                    const blob = await response.blob();
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    const enlace = document.createElement('a');
                    enlace.href = blobUrl;
                    enlace.download = `Promocion_${nombreActividad.replace(/\s+/g, '_')}.jpg`;
                    document.body.appendChild(enlace);
                    enlace.click();
                    document.body.removeChild(enlace);
                    
                    window.URL.revokeObjectURL(blobUrl);
                    mostrarToast("¡Descarga completada!");
                } catch (error) {
                    console.error("Error descargando via blob, intentando método fallback", error);
                    // Fallback si fetch falla por políticas estrictas
                    const enlace = document.createElement('a');
                    enlace.href = url;
                    enlace.target = "_blank";
                    enlace.download = `Promocion_${nombreActividad.replace(/\s+/g, '_')}.jpg`;
                    document.body.appendChild(enlace);
                    enlace.click();
                    document.body.removeChild(enlace);
                    mostrarToast("Abriendo imagen original para descargar...");
                }
            };

            const formatearFecha = (fecha) => {
                return fecha.toLocaleTimeString('es-MX', { hour: '2-digit', minute:'2-digit' });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* ENCABEZADO PREMIUM */}
                    <header className="bg-gradient-to-r from-slate-900 via-teal-900 to-slate-900 text-white p-6 shadow-xl relative overflow-hidden border-b border-teal-500/30">
                        <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] [mask-image:linear-gradient(to_bottom,white,transparent)]"></div>
                        
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
                            <div className="flex items-center gap-4">
                                <div className="bg-gradient-to-br from-teal-400 to-emerald-500 p-3 rounded-2xl shadow-lg shadow-teal-500/20">
                                    <Sparkles size={32} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-teal-200">
                                        Agente Turismo AI
                                    </h1>
                                    <p className="text-teal-200/80 text-sm font-medium flex items-center gap-2 mt-1">
                                        <MapPin size={14}/> Cancún & Riviera Maya
                                    </p>
                                </div>
                            </div>

                            <div className="flex flex-col sm:flex-row items-center gap-4 bg-white/5 p-2 rounded-2xl backdrop-blur-md border border-white/10">
                                <div className="flex items-center gap-2 text-sm text-teal-100 px-3">
                                    <Clock size={16} />
                                    <span>Última lectura: <strong>{formatearFecha(lastSync)}</strong></span>
                                </div>
                                <button 
                                    onClick={actualizarDatos}
                                    disabled={isSyncing}
                                    className={`flex items-center gap-2 px-6 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${
                                        isSyncing 
                                        ? 'bg-slate-700 text-slate-400 cursor-not-allowed' 
                                        : 'bg-white text-teal-900 hover:bg-teal-50 hover:scale-105 shadow-[0_0_20px_rgba(20,184,166,0.3)]'
                                    }`}
                                >
                                    <RefreshCw size={18} className={isSyncing ? 'animate-spin' : ''} />
                                    {isSyncing ? 'Procesando Datos...' : 'Ejecutar Agente'}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* CONTENIDO PRINCIPAL */}
                    <main className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 w-full flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* COLUMNA IZQUIERDA: DASHBOARD DE MERCADO */}
                        <section className="lg:col-span-4 space-y-6">
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 sm:p-8">
                                <div className="flex items-center justify-between mb-8">
                                    <h2 className="text-xl font-extrabold flex items-center gap-2 text-slate-800">
                                        <TrendingUp size={24} className="text-teal-500" />
                                        Radar de Tendencias
                                    </h2>
                                    <span className="text-xs font-bold bg-teal-50 text-teal-700 px-3 py-1.5 rounded-full border border-teal-100">
                                        En vivo
                                    </span>
                                </div>

                                <div className="space-y-6">
                                    {actividades.map((actividad, index) => (
                                        <div key={actividad.id} className="group">
                                            <div className="flex justify-between items-end mb-2">
                                                <div className="flex items-center gap-3">
                                                    <div className="text-2xl bg-slate-50 w-10 h-10 flex items-center justify-center rounded-xl border border-slate-100 shadow-sm group-hover:scale-110 transition-transform">
                                                        {actividad.icon}
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold text-sm text-slate-800 leading-tight group-hover:text-teal-600 transition-colors">
                                                            {actividad.nombre}
                                                        </h3>
                                                        <div className="text-xs text-slate-500 mt-1 font-medium">
                                                            {actividad.ubicacion}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="text-lg font-black text-teal-600">{actividad.demanda}</span>
                                                    <span className="text-[10px] text-slate-400 block -mt-1">pts</span>
                                                </div>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                                <div 
                                                    className={`h-full rounded-full transition-all duration-1000 ease-out relative ${
                                                        index === 0 ? 'bg-gradient-to-r from-red-500 to-orange-400' : 
                                                        index === 1 ? 'bg-gradient-to-r from-orange-400 to-amber-400' :
                                                        'bg-gradient-to-r from-teal-400 to-emerald-400'
                                                    }`}
                                                    style={{ width: `${actividad.demanda}%` }}
                                                >
                                                    {/* Shimmer effect */}
                                                    <div className="absolute top-0 left-0 right-0 bottom-0 bg-white/20 animate-[pulse_2s_ease-in-out_infinite]"></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="mt-8 pt-6 border-t border-slate-100">
                                    <div className="bg-slate-50 border border-slate-200 p-4 rounded-2xl flex gap-3 items-start">
                                        <div className="bg-white p-1.5 rounded-lg shadow-sm">
                                            <Instagram size={18} className="text-pink-500" />
                                        </div>
                                        <p className="text-xs text-slate-600 leading-relaxed">
                                            El agente escanea Google Trends y volumen de hashtags en Instagram para determinar las actividades más populares del día.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* COLUMNA DERECHA: RESULTADOS (POSTS + IMÁGENES) */}
                        <section className="lg:col-span-8">
                            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4">
                                <div>
                                    <h2 className="text-2xl font-extrabold flex items-center gap-2 text-slate-800">
                                        Campaña Automática
                                    </h2>
                                    <p className="text-sm text-slate-500 mt-1">Material listo para publicar en redes sociales.</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {posts.map((post) => (
                                    <div key={post.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full hover:shadow-xl transition-shadow duration-300">
                                        
                                        {/* Cabecera del Post (Estilo Instagram) */}
                                        <div className="p-4 border-b border-slate-100 flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 p-[2px]">
                                                    <div className="w-full h-full bg-white rounded-full border-2 border-white overflow-hidden">
                                                        <img src="https://api.dicebear.com/7.x/initials/svg?seed=TuAgencia&backgroundColor=0d9488" alt="Logo" className="w-full h-full object-cover" />
                                                    </div>
                                                </div>
                                                <div>
                                                    <div className="text-xs font-bold text-slate-800">TuAgencia_Oficial</div>
                                                    <div className="text-[10px] text-slate-500">{post.ubicacion}</div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Contenedor de Imagen Generada */}
                                        <div className="relative aspect-square bg-slate-100 group flex items-center justify-center overflow-hidden border-b border-slate-100">
                                            {post.isGeneratingImage ? (
                                                <div className="flex flex-col items-center gap-4 text-teal-600 w-full h-full justify-center bg-slate-50">
                                                    <Sparkles size={36} className="animate-spin-slow text-teal-500" />
                                                    <div className="text-center">
                                                        <span className="text-sm font-bold text-slate-700 block mb-1">IA en proceso</span>
                                                        <span className="text-xs text-slate-500 animate-pulse">Renderizando imagen 4k...</span>
                                                    </div>
                                                </div>
                                            ) : (
                                                <img 
                                                    src={post.imagenUrl} 
                                                    alt={post.actividad} 
                                                    className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                                                />
                                            )}
                                            
                                            {/* Etiqueta flotante del tipo de post */}
                                            <div className="absolute top-3 right-3 bg-black/60 backdrop-blur-md text-white text-[10px] font-bold tracking-wide uppercase px-3 py-1.5 rounded-full border border-white/20">
                                                {post.tipo}
                                            </div>
                                        </div>

                                        {/* Cuerpo del Post (Copy y Botones) */}
                                        <div className="p-5 flex-1 flex flex-col bg-white">
                                            <div className="flex gap-4 mb-4">
                                                <svg aria-label="Me gusta" className="text-slate-800 hover:text-slate-500 cursor-pointer" fill="currentColor" height="24" role="img" viewBox="0 0 24 24" width="24"><path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.167 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.84 1.175 2.369 1.175 3.216 0a4.21 4.21 0 0 1 3.693-1.941Z"></path></svg>
                                                <svg aria-label="Comentar" className="text-slate-800 hover:text-slate-500 cursor-pointer" fill="currentColor" height="24" role="img" viewBox="0 0 24 24" width="24"><path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L22 22Z" fill="none" stroke="currentColor" strokeLinejoin="round" strokeWidth="2"></path></svg>
                                                <svg aria-label="Compartir" className="text-slate-800 hover:text-slate-500 cursor-pointer" fill="currentColor" height="24" role="img" viewBox="0 0 24 24" width="24"><line fill="none" stroke="currentColor" strokeLinejoin="round" strokeWidth="2" x1="22" x2="9.218" y1="3" y2="10.083"></line><polygon fill="none" points="11.698 20.334 22 3.001 2 3.001 9.218 10.084 11.698 20.334" stroke="currentColor" strokeLinejoin="round" strokeWidth="2"></polygon></svg>
                                            </div>
                                            
                                            <div className="text-sm text-slate-800 whitespace-pre-wrap flex-1 mb-4 font-normal leading-relaxed">
                                                <span className="font-bold mr-2">TuAgencia_Oficial</span>
                                                {post.copy}
                                            </div>
                                            
                                            <div className="text-xs text-blue-600 font-medium mb-6 leading-tight">
                                                {post.hashtags}
                                            </div>
                                            
                                            {/* Controles de Acción */}
                                            <div className="mt-auto flex gap-3 pt-4 border-t border-slate-100">
                                                <button 
                                                    onClick={() => copiarAlPortapapeles(`${post.copy}\n\n${post.hashtags}`)}
                                                    className="flex-1 flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-sm font-bold transition-colors"
                                                >
                                                    <Copy size={16} /> Texto
                                                </button>
                                                <button 
                                                    onClick={() => descargarImagen(post.imagenUrl, post.actividad)}
                                                    disabled={post.isGeneratingImage}
                                                    className={`flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-bold transition-colors ${
                                                        post.isGeneratingImage 
                                                        ? 'bg-slate-50 text-slate-400 cursor-not-allowed' 
                                                        : 'bg-teal-600 hover:bg-teal-700 text-white shadow-md shadow-teal-500/20'
                                                    }`}
                                                >
                                                    <Download size={16} /> Bajar Img
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    <Toast mensaje={toastMessage} visible={showToast} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
